<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnosOS | API Master</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent: #1DB954; /* Spotify Yeşili */
            --accent-glow: #1ed760;
            --glass: rgba(30, 30, 30, 0.5);
        }
        
        body { margin: 0; padding: 0; background-color: var(--bg-color); font-family: -apple-system, sans-serif; color: white; height: 100vh; overflow: hidden; }

        .ambient-light { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(29,185,84,0.15) 0%, transparent 70%); border-radius: 50%; top: -50px; left: -50px; z-index: 0; }

        /* GİRİŞ EKRANI */
        #loginScreen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; position: relative; z-index: 10; }
        .ios-card { background: var(--glass); border: 0.5px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px 25px; width: 260px; text-align: center; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        button { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: black; border: none; padding: 16px 0; border-radius: 20px; font-weight: 800; width: 100%; cursor: pointer; letter-spacing: 1px; margin-top: 15px; }

        /* DASHBOARD */
        #dashboard { display: none; padding: 80px 15px 100px 15px; overflow-y: auto; height: 100vh; box-sizing: border-box; position: relative; z-index: 5; }
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .glass-module { background: var(--glass); border-radius: 22px; padding: 20px; border: 0.5px solid rgba(255,255,255,0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); text-align: center; }
        
        .album-art { width: 150px; height: 150px; background: #111; margin: 0 auto 15px; border-radius: 15px; background-size: cover; background-position: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { font-size: 0.6rem; letter-spacing: 2px; color: var(--accent); margin: 0 0 15px 0; text-transform: uppercase; }
        textarea { background: transparent; border: none; color: white; width: 100%; height: 80px; outline: none; resize: none; font-size: 1rem; }

        /* DYNAMIC ISLAND */
        .dynamic-island { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: #000; border-radius: 20px; z-index: 1000; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 0.5px solid #333; }
        
        /* ALT MENÜ */
        .nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 85%; height: 65px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 32px; display: flex; justify-content: space-around; align-items: center; border: 0.5px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-item { font-size: 1.5rem; opacity: 0.7; }
    </style>
</head>
<body>

<div class="ambient-light"></div>

<div id="loginScreen">
    <div class="ios-card">
        <h1 style="margin:0; font-size:1.8rem; color:white;">ENOS<span style="color:var(--accent);">OS</span></h1>
        <p style="color:#888; font-size:0.8rem; margin:10px 0 20px 0;">Spotify Core Engine</p>
        <button onclick="authorizeSpotify()">SPOTIFY'A BAĞLAN</button>
    </div>
</div>

<div id="dashboard">
    <div class="dynamic-island">
        <span style="font-size:0.8rem; font-weight:bold; color:var(--accent);">API ONLINE</span>
    </div>

    <div style="margin-bottom:20px; padding-left:5px;">
        <h2 style="margin:0; font-size:1.8rem;">SelimEnos</h2>
        <p style="color:#888; margin:5px 0 0 0;" id="dateText"></p>
    </div>

    <div class="grid-layout">
        <div class="glass-module">
            <h3>NOW PLAYING</h3>
            <div class="album-art" id="albumArt"></div>
            <div id="trackName" style="font-size:1.2rem; font-weight:bold; margin-bottom:5px;">Bekleniyor...</div>
            <div id="artistName" style="color:#aaa; font-size:0.9rem; margin-bottom:15px;">Müzik Açın</div>
            <button onclick="getNowPlaying()" style="background:#222; color:white; padding:10px; font-size:0.8rem; width:80%;">YENİLE</button>
        </div>

        <div class="glass-module">
            <h3>ENOS NOTES</h3>
            <textarea id="notesArea" placeholder="Sözleri buraya yaz..." oninput="saveNotes()"></textarea>
        </div>
    </div>
</div>

<div class="nav-bar" id="navBar" style="display:none;">
    <div class="nav-item">🏠</div>
    <div class="nav-item" onclick="getNowPlaying()">🔄</div>
    <div class="nav-item" onclick="document.getElementById('notesArea').focus()">📝</div>
</div>
