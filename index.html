<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>EnosOS Premium</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        .module { background: rgba(30,30,30,0.8); border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { font-size: 2rem; margin-top: 50px; }
        button { background: #1DB954; color: black; border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 85%; margin-top: 10px; font-size: 1rem; }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 85%; margin-bottom: 10px; }
        #dashboard { display: none; padding-top: 20px; }
        iframe { border-radius: 15px; background: #000; width: 100%; height: 200px; border: none; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <h2>ENOS<span style="color:#1DB954">OS</span></h2>
    <p style="color:#888;">Media Center v4.0</p>
    <div style="margin-top:100px;">
        <button onclick="authorizeSpotify()">SİSTEMİ BAŞLAT</button>
    </div>
</div>

<div id="dashboard">
    <div class="module">
        <h3 style="color:#1DB954; font-size:0.7rem;">AUDIO ENGINE</h3>
        <div id="trackName" style="font-weight:bold; font-size:1.2rem;">SİSTEM AKTİF</div>
        <p id="artistName" style="color:#888;">Müzik Yükleyin</p>
        <input type="file" id="localAudio" accept="audio/*" style="display:none;" onchange="playLocal(event)">
        <button style="background:#333; color:white;" onclick="document.getElementById('localAudio').click()">🎵 MP3 SEÇ / ÇAL</button>
        <audio id="player" style="display:none;"></audio>
    </div>

    <div class="module">
        <h3 style="color:#FF0000; font-size:0.7rem;">VIDEO ENGINE</h3>
        <input type="text" id="ytUrl" placeholder="YouTube Linki...">
        <button style="background:#FF0000; color:white;" onclick="loadYT()">📺 VİDEOYU AÇ</button>
        <div id="videoArea"></div>
    </div>
</div>

<script>
    // iPhone 5 uyumlu eski tip değişkenler (var)
    var CLIENT_ID = 'f6fc97d12a8844bd98dd638ab532b4ef';
    var REDIRECT_URI = 'https://selimenos6.github.io/Enosmusic/';

    function authorizeSpotify() {
        var url = 'https://accounts.spotify.com/authorize' + 
                  '?client_id=' + CLIENT_ID + 
                  '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) + 
                  '&scope=user-read-currently-playing' + 
                  '&response_type=code' + 
                  '&show_dialog=true';
        window.location.href = url;
    }

    // SAYFA YÜKLENDİĞİNDE ÇALIŞAN KONTROL MOTORU
    window.onload = function() {
        var currentUrl = window.location.href;
        
        // EĞER LİNKTE HERHANGİ BİR CEVAP VARSA DASHBOARD'U ZORLA AÇ!
        if (currentUrl.indexOf('code=') > -1 || currentUrl.indexOf('access_token=') > -1 || currentUrl.indexOf('?v=') > -1) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }
    }

    function playLocal(e) {
        var file = e.target.files[0];
        if(!file) return;
        var player = document.getElementById('player');
        player.src = URL.createObjectURL(file);
        document.getElementById('trackName').innerText = file.name;
        player.play();
    }

    function loadYT() {
        var url = document.getElementById('ytUrl').value;
        var vidId = "";
        if(url.indexOf('v=') > -1) vidId = url.split('v=')[1].split('&')[0];
        else if(url.indexOf('youtu.be/') > -1) vidId = url.split('youtu.be/')[1].split('?')[0];
        
        if(vidId) {
            document.getElementById('videoArea').innerHTML = '<iframe src="https://www.youtube.com/embed/' + vidId + '?autoplay=1" allowfullscreen></iframe>';
        }
    }
</script>
</body>
</html>
